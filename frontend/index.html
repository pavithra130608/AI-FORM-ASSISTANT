<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>AI Government Form Assistant</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
* { box-sizing: border-box; }

body {
  margin: 0;
  font-family: "Segoe UI", Arial, sans-serif;
  background: #e5e7eb;
  display: flex;
  justify-content: center;
  height: 100vh;
}

#app {
  width: 100%;
  max-width: 420px;
  background: #f9fafb;
  display: flex;
  flex-direction: column;
  border-radius: 12px;
  overflow: hidden;
  box-shadow: 0 10px 30px rgba(0,0,0,0.15);
}

#header {
  background: #2563eb;
  color: white;
  padding: 14px;
  text-align: center;
  font-weight: 600;
}

#uploadBox {
  display: flex;
  gap: 6px;
  padding: 10px;
  background: white;
  border-bottom: 1px solid #e5e7eb;
}

#uploadBox input[type=file],
#uploadBox select {
  flex: 1;
  font-size: 12px;
}

#chat {
  flex: 1;
  padding: 12px;
  overflow-y: auto;
  background: #f3f4f6;
}

.msg {
  max-width: 80%;
  padding: 10px 14px;
  border-radius: 16px;
  margin-bottom: 10px;
  font-size: 14px;
}

.bot {
  background: white;
  color: #111827;
  align-self: flex-start;
  border-bottom-left-radius: 4px;
}

.user {
  background: #2563eb;
  color: white;
  align-self: flex-end;
  border-bottom-right-radius: 4px;
}

.system {
  text-align: center;
  font-size: 12px;
  color: #6b7280;
  margin: 10px 0;
}

#inputBar {
  display: flex;
  gap: 6px;
  padding: 10px;
  background: white;
  border-top: 1px solid #e5e7eb;
}

#input {
  flex: 1;
  padding: 10px;
  border-radius: 20px;
  border: 1px solid #d1d5db;
}

button {
  border: none;
  background: #2563eb;
  color: white;
  padding: 0 14px;
  border-radius: 50%;
  cursor: pointer;
  font-size: 16px;
}
</style>
</head>

<body>
<div id="app">

  <div id="header">🤖 AI Government Form Assistant</div>

  <div id="uploadBox">
    <input type="file" id="formFile">
    <select id="lang">
      <option value="English">English</option>
      <option value="Tamil">Tamil</option>
      <option value="Hindi">Hindi</option>
    </select>
    <button onclick="uploadForm()">⬆</button>
  </div>

  <div id="chat"></div>

  <div id="inputBar">
    <input id="input" type="text" placeholder="Type your answer…" disabled>
    <button onclick="send()">➤</button>
    <button onclick="startVoice()">🎤</button>
  </div>

</div>

<script>

let sessionId = null;   // 🔥 dynamic session
let filename = null;
let recognition;

const chat = document.getElementById("chat");
const input = document.getElementById("input");
const langSelect = document.getElementById("lang");

function generateSessionId() {
  return "session_" + Date.now();
}

function add(text, cls){
  const d = document.createElement("div");
  d.className = cls === "system" ? "system" : "msg " + cls;
  d.innerText = text;
  chat.appendChild(d);
  chat.scrollTop = chat.scrollHeight;
}

function resetChat(){
  chat.innerHTML = "";
  input.value = "";
  input.disabled = true;
}

function getText(msg){
  if (!msg) return "";
  if (typeof msg === "string") return msg;
  if (typeof msg === "object" && msg.question) return msg.question;
  return "";
}

/* ---------- UPLOAD ---------- */
function uploadForm(){

  const f = document.getElementById("formFile").files[0];
  if(!f) return alert("Select a form");

  resetChat();

  sessionId = generateSessionId();  // 🔥 new session every upload

  const fd = new FormData();
  fd.append("file", f);

  fetch("/chat/upload/", { method: "POST", body: fd })
    .then(r => r.json())
    .then(d => {
      filename = d.filename;
      add("Form uploaded successfully ✅", "system");
      startChat();
    });
}

/* ---------- START CHAT ---------- */
function startChat(){

  fetch(`/chat/start?session_id=${sessionId}&filename=${filename}`, {
    method: "POST"
  })
  .then(r => r.json())
  .then(d => {
    add(getText(d.question), "bot");
    input.disabled = false;
    input.focus();
  });
}

/* ---------- SEND MESSAGE ---------- */
function send(){

  if(!input.value.trim()) return;

  const text = input.value;
  input.value = "";
  input.disabled = true;

  add(text, "user");

  fetch(`/chat/answer?session_id=${sessionId}&text=${encodeURIComponent(text)}`, {
    method: "POST"
  })
  .then(r => r.json())
  .then(d => {

    if(d.question){
      add(getText(d.question), "bot");
      input.disabled = false;
      input.focus();
    }

    if(d.completed){
      add("Form completed ✅ Downloading PDF…", "system");
      window.open(`/generate-pdf?session_id=${sessionId}`, "_blank");
    }
  });
}

/* ---------- VOICE ---------- */
function startVoice(){
  if(!('webkitSpeechRecognition' in window)){
    alert("Voice not supported in this browser");
    return;
  }

  recognition = new webkitSpeechRecognition();
  recognition.lang =
    langSelect.value === "Tamil" ? "ta-IN" :
    langSelect.value === "Hindi" ? "hi-IN" : "en-IN";

  recognition.start();

  recognition.onresult = e => {
    input.value = e.results[0][0].transcript;
    input.focus();
  };
}

</script>

</body>
</html>
